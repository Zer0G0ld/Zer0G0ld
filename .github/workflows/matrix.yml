name: Generate Matrix Rain SVG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create dist directory
        run: mkdir -p dist
      
      - name: Generate Matrix Rain SVG
        run: |
          mkdir -p dist
          cat > dist/matrix-rain.svg << 'EOF'
          <svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="#0a0a0a"/>
            <text x="20" y="50" fill="#00FF41" font-family="monospace" font-size="14">
              Zer0@Tech:~$ matrix_rain --active
            </text>
            <text x="20" y="80" fill="#00FF41" font-family="monospace" font-size="12">
              01001100 01101001 01101110 01110101 01111000 00100000 01001001 01110011 00100000 01001100 01101111 01110110 01100101
            </text>
            <text x="20" y="110" fill="#00FF41" font-family="monospace" font-size="12">
              01010010 01101111 01101111 01110100 00100000 01000001 01100011 01100011 01100101 01110011 01110011 00100000 01000111 01110010 01100001 01101110 01110100 01100101 01100100
            </text>
            <text x="20" y="140" fill="#00FF41" font-family="monospace" font-size="12">
              01011010 01100101 01110010 00110000 01010100 01100101 01100011 01101000 00100000 01000001 01100011 01110100 01101001 01110110 01100101
            </text>
          </svg>
          EOF
      
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          keep_files: false
