name: Generate Tetris SVG

on:
  schedule:
    - cron: "0 0 * * *"  # Roda todo dia
  workflow_dispatch:  # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # CRUCIAL - dá permissão de escrita
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Create dist directory
        run: mkdir -p dist
      
      - name: Generate Tetris SVG
        run: |
          cat > dist/tetris.svg << 'EOF'
          <svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="#0a0a0a"/>
            
            <!-- Grid do Tetris -->
            <g transform="translate(50, 50)">
              <!-- Peças do Tetris -->
              <rect x="0" y="0" width="30" height="30" fill="#00FF41" opacity="0.8"/>
              <rect x="30" y="0" width="30" height="30" fill="#00FF41" opacity="0.8"/>
              <rect x="60" y="0" width="30" height="30" fill="#00FF41" opacity="0.8"/>
              <rect x="0" y="30" width="30" height="30" fill="#00FF41" opacity="0.8"/>
              
              <!-- Texto -->
              <text x="200" y="30" fill="#00FF41" font-family="monospace" font-size="20" font-weight="bold">
                ZER0 TETRIS
              </text>
              <text x="200" y="60" fill="#00FF41" font-family="monospace" font-size="14">
                Score: 1337
              </text>
              <text x="200" y="90" fill="#00FF41" font-family="monospace" font-size="14">
                Lines: 42
              </text>
              <text x="200" y="120" fill="#00FF41" font-family="monospace" font-size="14">
                Level: HACKER
              </text>
              <text x="200" y="160" fill="#FFFF00" font-family="monospace" font-size="12">
                Next: Z-Core Engine
              </text>
            </g>
          </svg>
          EOF
      
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          keep_files: false
