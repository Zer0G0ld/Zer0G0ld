name: Pac-Man Commit Eater

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch commit data
        run: |
          curl -s "https://api.github.com/users/Zer0G0ld/events" | \
          jq '[.[] | select(.type=="PushEvent")] | length' > commits.txt
          
      - name: Generate Pac-Man SVG
        run: |
          COMMITS=$(cat commits.txt)
          cat > dist/pacman.svg << EOF
          <svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="#000"/>
            <text x="10" y="50" fill="yellow" font-size="20">Pac-Man: \$COMMITS commits hoje!</text>
          </svg>
      
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
